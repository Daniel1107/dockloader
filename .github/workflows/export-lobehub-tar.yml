name: 📦 导出 LobeHub 最新离线镜像包

on:
  workflow_dispatch: # 开启手动触发按钮，随时想更新随时点

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 从 Docker Hub 官方拉取最新版
        run: |
          docker pull lobehub/lobehub:latest

      - name: 2. 将镜像打包为 Tar 离线文件
        run: |
          docker save -o lobehub_latest.tar lobehub/lobehub:latest

      - name: 3. 上传为 GitHub Artifact (供下载)
        uses: actions/upload-artifact@v4
        with:
          name: lobehub-offline-image
          path: lobehub_latest.tar
          retention-days: 1

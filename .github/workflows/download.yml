name: Docker Image Downloader
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 升级到 v4
      - name: Login to GHCR
        uses: docker/login-action@v3 # 升级到 v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and Push
        run: |
          # 直接拉取目前 GitHub 上最硬核的 v2 节点，不跟 latest 废话
          docker pull ghcr.io/lobehub/lobe-chat:v2.1.31
          
          # 贴上你的 Daniel1107 标签
          docker tag ghcr.io/lobehub/lobe-chat:v2.1.31 ghcr.io/daniel1107/lobe-chat:latest
          
          # 推送
          docker push ghcr.io/daniel1107/lobe-chat:latest

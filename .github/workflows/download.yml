name: Docker Image Downloader
on:
  workflow_dispatch:
    inputs:
      tag:
        description: '版本号 (建议填 latest 或 v2.1.2)'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and Push
        run: |
          docker pull lobehub/lobe-chat:${{ github.event.inputs.tag }}
          docker tag lobehub/lobe-chat:${{ github.event.inputs.tag }} ghcr.io/daniel1107/lobe-chat:${{ github.event.inputs.tag }}
          docker push ghcr.io/daniel1107/lobe-chat:${{ github.event.inputs.tag }}

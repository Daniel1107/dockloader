name: Docker Image Downloader
on:
  workflow_dispatch:
    inputs:
      image:
        description: '镜像名称'
        required: true
        default: 'lobehub/lobe-chat'
      tag:
        description: '版本标签'
        required: true
        default: 'v2.10.4'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and Push
        run: |
          docker pull ${{ github.event.inputs.image }}:${{ github.event.inputs.tag }}
          docker tag ${{ github.event.inputs.image }}:${{ github.event.inputs.tag }} ghcr.io/${{ github.repository_owner }}/lobe-chat:${{ github.event.inputs.tag }}
          docker push ghcr.io/${{ github.repository_owner }}/lobe-chat:${{ github.event.inputs.tag }}

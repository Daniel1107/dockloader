name: 📦 导出 LobeHub 数据库与存储依赖包

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 从海外节点拉取数据库和对象存储镜像
        run: |
          docker pull pgvector/pgvector:16-pg16
          # 顺便把 minio 也重新拉一遍打进包里，以防万一
          docker pull minio/minio:latest

      - name: 2. 将两个镜像合并打包为一个 Tar 文件
        run: |
          docker save -o lobehub_deps.tar pgvector/pgvector:16-pg16 minio/minio:latest

      - name: 3. 上传为 GitHub Artifact (供下载)
        uses: actions/upload-artifact@v4
        with:
          name: lobehub-deps-offline
          path: lobehub_deps.tar
          retention-days: 1

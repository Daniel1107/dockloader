name: 📦 导出 LobeHub 终极数据库 (ParadeDB)

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取 ParadeDB 增强版数据库镜像
        run: |
          docker pull paradedb/paradedb:latest

      - name: 2. 打包 Tar 文件
        run: |
          docker save -o paradedb.tar paradedb/paradedb:latest

      - name: 3. 上传为 GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: paradedb-offline
          path: paradedb.tar
          retention-days: 1
